<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>养基日记</title>
<style>
  :root {
    --bg: #0f1923; --card: #1a2736; --border: #2a3a4a;
    --green: #00c853; --red: #e74c3c; --blue: #3498db;
    --gold: #f39c12; --text: #e0e6ed; --dim: #8899aa;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-size: 14px; line-height: 1.5;
    max-width: 600px; margin: 0 auto; padding: 12px;
  }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 4px 0 14px;
  }
  .top-bar .title { font-size: 18px; font-weight: 700; }
  .top-bar .summary { font-size: 12px; color: var(--dim); text-align: right; }
  .top-bar .summary b { font-size: 15px; }

  .action-card {
    border-radius: 12px; padding: 14px 16px; margin-bottom: 8px;
    border-left: 4px solid; display: flex; gap: 12px; align-items: flex-start;
  }
  .action-card.stop { background: #2a1a1a; border-color: var(--red); }
  .action-card.dip  { background: #1a2a2a; border-color: var(--blue); }
  .action-card.watch { background: #2a2a1a; border-color: var(--gold); }
.action-card.profit { background: #1a2a1a; border-color: var(--green); }
  .action-card .icon { font-size: 24px; flex-shrink: 0; }
  .action-card .body { flex: 1; }
  .action-card .act-title { font-size: 15px; font-weight: 700; margin-bottom: 2px; }
  .action-card .act-desc { font-size: 12px; color: var(--dim); }
  .action-card .act-fund { font-size: 13px; font-weight: 600; margin-top: 4px; }
  .empty-actions {
    text-align: center; padding: 24px; color: var(--dim);
    font-size: 14px;
  }

  .section-title {
    font-size: 12px; font-weight: 700; color: var(--dim);
    margin: 16px 0 6px; letter-spacing: 1px; display: flex; justify-content: space-between;
  }

  .fund-row {
    display: flex; align-items: center; padding: 8px 10px;
    background: var(--card); border-radius: 8px; margin-bottom: 4px;
    border: 1px solid var(--border); gap: 8px;
  }
  .fund-row .sig { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .fund-row .info { flex: 1; min-width: 0; }
  .fund-row .fname { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fund-row .fma { font-size: 10px; color: var(--dim); }
  .fund-row .nums { text-align: right; flex-shrink: 0; }
  .fund-row .price { font-size: 13px; }
  .fund-row .pnl { font-size: 11px; }

  .index-bar {
    display: flex; gap: 6px; overflow-x: auto; padding: 12px 0 4px;
    scrollbar-width: none;
  }
  .index-bar::-webkit-scrollbar { display: none; }
  .idx-item {
    flex-shrink: 0; background: var(--card); border-radius: 8px;
    padding: 6px 10px; text-align: center; border: 1px solid var(--border);
    min-width: 85px;
  }
  .idx-item .name { font-size: 10px; color: var(--dim); }
  .idx-item .price { font-size: 14px; font-weight: 700; }
  .idx-item .change { font-size: 11px; }

  .refresh-bar { text-align: center; padding: 12px 0 4px; font-size: 10px; color: var(--dim); }
  .footer { text-align: center; padding: 16px 0 8px; font-size: 10px; opacity: 0.3; }

  .up { color: #e74c3c; } .down { color: #00c853; }

  /* ─── 聊天 ─── */
  .chat-container {
    margin: 12px 0; border-radius: 12px; overflow: hidden;
    background: var(--card); border: 1px solid var(--border);
  }
  .chat-header {
    padding: 12px 16px; font-weight: 600; font-size: 14px;
    cursor: pointer; user-select: none;
    display: flex; justify-content: space-between;
  }
  .chat-messages { display: none; padding: 0 16px 8px; max-height: 360px; overflow-y: auto; }
  .chat-messages.open { display: block; }
  .chat-hint { color: var(--dim); font-size: 12px; padding: 8px 0; }
  .chat-msg { padding: 8px 12px; border-radius: 10px; margin: 6px 0; font-size: 13px; line-height: 1.6; }
  .chat-msg.q { background: #1e3a5f; text-align: right; }
  .chat-msg.a { background: #1a2a1a; }
  .chat-msg.a h3 { margin: 12px 0 6px; font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  .chat-msg.a strong { color: #fff; }
  .chat-msg.a ul { margin: 6px 0; padding-left: 18px; }
  .chat-msg.a li { margin: 2px 0; }
  .chat-msg.a code { background: rgba(255,255,255,0.1); padding: 1px 5px; border-radius: 3px; font-size: 12px; }
  .chat-msg .label { font-size: 10px; color: var(--dim); margin-bottom: 2px; }
  .chat-input-row { display: flex; padding: 8px 12px; gap: 8px; border-top: 1px solid var(--border); }
  .chat-input-row input {
    flex:1; padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px;
  }
  .chat-input-row button {
    padding: 10px 16px; border: none; border-radius: 8px;
    background: var(--blue); color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .chat-spinner { text-align: center; padding: 12px; color: var(--dim); }

  /* ─── 引导页 ─── */
  #onboarding { text-align: center; padding: 40px 0; }
  #onboarding .logo { font-size: 48px; margin-bottom: 8px; }
  #onboarding h2 { font-size: 20px; margin-bottom: 6px; }
  #onboarding .sub { font-size: 14px; color: var(--dim); margin-bottom: 28px; }
  #onboarding .qr-box {
    display: inline-block; background: #fff; padding: 12px; border-radius: 12px;
    margin-bottom: 16px;
  }
  #onboarding .qr-box img { display: block; width: 220px; height: 220px; }
  #onboarding .qr-hint { font-size: 13px; color: var(--dim); margin-bottom: 8px; }
  #onboarding .qr-status { font-size: 12px; color: var(--gold); min-height: 18px; }
  #onboarding .btn {
    display: inline-block; padding: 12px 32px; border-radius: 8px; border: none;
    background: var(--blue); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  #onboarding .btn-ghost {
    background: transparent; border: 1px solid var(--border); color: var(--dim);
    font-size: 13px; padding: 8px 20px; margin-top: 12px;
  }

  #dashboard { display: none; }

  /* ─── 顶部重登 ─── */
  .relogin { font-size: 10px; color: var(--dim); cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<!-- ═══ 引导页（未登录） ═══ -->
<div id="onboarding">
  <div class="logo">🐔</div>
  <h2>养基日记</h2>
  <div class="sub">基金组合量化分析工作台</div>
  <div id="qrArea">
    <button class="btn" onclick="startLogin()">📱 获取二维码登录</button>
    <div style="font-size:11px;color:var(--dim);margin-top:8px">需要手机上装有养基宝 APP</div>
  </div>
</div>

<!-- ═══ 主看板（已登录） ═══ -->
<div id="dashboard">

<div class="top-bar">
  <div class="title">📊 养基日记</div>
  <div class="summary" id="accountSummary">加载中...</div>
</div>

<!-- 今日操作 — 核心区域 -->
<div id="actions"></div>

<!-- 指数快照 -->
<div class="index-bar" id="indexBar"></div>

<!-- 全部持仓 -->
<div class="section-title">
  <span>📋 持仓</span>
  <span id="signalSummary"></span>
</div>
<div id="fundList"></div>

<!-- AI 投资助理聊天 -->
<div class="chat-container">
  <div class="chat-header" onclick="document.getElementById('chatMessages').classList.toggle('open');this.querySelector('.toggle').textContent=document.getElementById('chatMessages').classList.contains('open')?'▲':'▼'">
    🤖 AI 投资助理 · 问持仓 <span class="toggle">▼</span>
  </div>
  <div class="chat-messages" id="chatMessages">
    <div class="chat-hint">💡 试试问：黄金该止损吗？美股现在该加仓还是持有？</div>
  </div>
  <div class="chat-input-row">
    <input type="text" id="chatInput" placeholder="问你的投资问题…" onkeypress="if(event.key==='Enter')askAI()">
    <button onclick="askAI()">发送</button>
  </div>
</div>

<div class="refresh-bar">
  <span id="updateTime"></span> · <span class="relogin" onclick="doRelogin()">重新登录</span>
</div>
<div class="footer">养基日记 · 数据仅供参考</div>

</div><!-- /dashboard -->

<script>
// ═══════════════════════════════════════════════
// 引导登录
// ═══════════════════════════════════════════════
let _qrId = null;
let _pollTimer = null;
let _pollStart = 0;

async function startLogin() {
  const qrArea = document.getElementById('qrArea');
  qrArea.innerHTML = '<div style="color:var(--dim)">⏳ 正在获取二维码...</div>';

  try {
    const resp = await fetch('/api/login/qrcode');
    const data = await resp.json();
    if (!data.ok) { qrArea.innerHTML = `<div style="color:var(--red)">获取失败：${data.error}</div><button class="btn btn-ghost" onclick="startLogin()">重试</button>`; return; }

    _qrId = data.qrId;
    _pollStart = Date.now();
    qrArea.innerHTML = `
      <div class="qr-box"><img src="${data.qrImage}" alt="二维码"></div>
      <div class="qr-hint">📱 打开养基宝 APP 扫码登录</div>
      <div class="qr-status" id="qrStatus">⏳ 等待扫码...</div>
      <button class="btn btn-ghost" onclick="startLogin()">🔄 重新获取</button>
    `;
    startPolling();
  } catch (e) {
    qrArea.innerHTML = `<div style="color:var(--red)">网络错误：${e.message}</div><button class="btn btn-ghost" onclick="startLogin()">重试</button>`;
  }
}

function startPolling() {
  if (_pollTimer) clearInterval(_pollTimer);
  _pollTimer = setInterval(pollLogin, 3000);
}

async function pollLogin() {
  if (!_qrId) return;
  const elapsed = (Date.now() - _pollStart) / 1000;

  // 超时 120 秒
  if (elapsed > 120) {
    clearInterval(_pollTimer);
    document.getElementById('qrStatus').textContent = '⏰ 二维码已过期，请重新获取';
    _qrId = null;
    return;
  }

  try {
    const resp = await fetch('/api/login/check/' + _qrId);
    const data = await resp.json();
    if (data.status === 'done') {
      clearInterval(_pollTimer);
      document.getElementById('qrStatus').innerHTML = '<span style="color:var(--green)">✅ 登录成功！</span>';
      setTimeout(showDashboard, 600);
    } else if (data.status === 'error') {
      document.getElementById('qrStatus').textContent = '⚠️ ' + data.error;
    }
    // status === 'waiting' — 继续等
  } catch (e) {
    // 网络抖动，忽略
  }
}

function doRelogin() {
  if (!confirm('重新登录需要重新扫码，确定吗？')) return;
  clearInterval(_pollTimer);
  _qrId = null;
  document.getElementById('onboarding').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('qrArea').innerHTML = `
    <button class="btn" onclick="startLogin()">📱 获取二维码登录</button>
    <div style="font-size:11px;color:var(--dim);margin-top:8px">需要手机上装有养基宝 APP</div>
  `;
}

function showDashboard() {
  document.getElementById('onboarding').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  load();
}

// ═══════════════════════════════════════════════
// 看板（原有逻辑）
// ═══════════════════════════════════════════════

async function load() {
  document.getElementById('updateTime').textContent = '加载中...';
  try {
    const resp = await fetch('/api/dashboard');
    const data = await resp.json();
    if (data.ok) render(data);
    document.getElementById('updateTime').textContent = data.time;
  } catch(e) {
    document.getElementById('updateTime').textContent = '连接失败';
  }
}

function render(d) {
  // ─── 顶部账户摘要 ───
  const ti = d.summary.todayIncome;
  const tr = d.summary.todayRate;
  const cls = ti >= 0 ? 'up' : 'down';
  document.getElementById('accountSummary').innerHTML =
    `今日 <b class="${cls}">${ti>=0?'+':''}¥${ti.toFixed(0)}</b> (${tr>=0?'+':''}${tr.toFixed(2)}%)<br>总资产 ¥${d.summary.totalAssets.toFixed(0)}`;

  // ═══ 今日操作（核心差异化！养基宝没有的） ═══
  const actions = document.getElementById('actions');
  const stops = d.funds.filter(f => f.signal === 'stop_loss');
  const dips = d.funds.filter(f => f.signal === 'dip_buy');
  const watches = d.funds.filter(f => f.signal === 'watch');
  const profits = d.funds.filter(f => f.signal === 'take_profit');

  if (stops.length + dips.length + watches.length + profits.length === 0) {
    const holdCount = d.funds.filter(f => f.signal === 'hold').length;
    actions.innerHTML = `<div class="empty-actions">✅ 无需操作<br><span style="font-size:11px;color:#666">${holdCount}/${d.funds.length} 只基金趋势正常，继续持有</span></div>`;
  } else {
    let html = '';
    // 止损（最紧急，排最前）
    stops.forEach(f => {
      html += `<div class="action-card stop" onclick="document.getElementById('fundList').scrollIntoView({behavior:'smooth'})">
        <div class="icon">🔴</div>
        <div class="body">
          <div class="act-title">止损 — ${f.name}</div>
          <div class="act-desc">连续 ${f.consec} 日低于 MA20(${f.ma20?.toFixed(3)})，偏离 ${f.devMA20}%</div>
          <div class="act-fund">盈亏 ${f.profit>=0?'+':''}¥${f.profit?.toFixed(0)} · 建议${f.profit<0?'赎回':'减仓保利润'}</div>
        </div>
      </div>`;
    });
    // 止盈
    profits.forEach(f => {
      html += `<div class="action-card profit">
        <div class="icon">💰</div>
        <div class="body">
          <div class="act-title">止盈 — ${f.name}</div>
          <div class="act-desc">盈利 ${f.profit>=0?'+':''}¥${f.profit?.toFixed(0)} (${f.profitPct?.toFixed(1)}%)，趋势转弱建议锁定利润</div>
          <div class="act-fund">现价 ${f.valuation?.toFixed(4)} · 建议分批止盈</div>
        </div>
      </div>`;
    });
    // 补仓
    dips.forEach(f => {
      html += `<div class="action-card dip">
        <div class="icon">🔵</div>
        <div class="body">
          <div class="act-title">补仓机会 — ${f.name}</div>
          <div class="act-desc">跌破 MA20 偏离 ${f.devMA20}%，回测显示此类基金止损不如补仓</div>
          <div class="act-fund">现价 ${f.valuation?.toFixed(4)} · 可分批小额加仓</div>
        </div>
      </div>`;
    });
    // 关注
    watches.forEach(f => {
      html += `<div class="action-card watch">
        <div class="icon">🟡</div>
        <div class="body">
          <div class="act-title">关注 — ${f.name}</div>
          <div class="act-desc">偏离 MA20 ${f.devMA20}%，接近止损阈值</div>
          <div class="act-fund">现价 ${f.valuation?.toFixed(4)} · 观察尾盘是否收复</div>
        </div>
      </div>`;
    });
    actions.innerHTML = html;
  }

  // ─── 指数 ───
  const idxOrder = ['上证指数','深证成指','创业板指','沪深300','上证50','科创50'];
  const idxBar = document.getElementById('indexBar');
  idxBar.innerHTML = '';
  for (const name of idxOrder) {
    const item = Object.values(d.index || {}).find(i => i.name === name);
    if (!item) continue;
    const up = item.change >= 0;
    idxBar.innerHTML += `<div class="idx-item">
      <div class="name">${name}</div>
      <div class="price ${up ? 'up' : 'down'}">${item.price.toFixed(2)}</div>
      <div class="change ${up ? 'up' : 'down'}">${up?'+':''}${item.change.toFixed(2)}%</div>
    </div>`;
  }

  // ─── 信号统计 ───
  document.getElementById('signalSummary').innerHTML =
    `${stops.length>0?'🔴'+stops.length:''} ${dips.length>0?'🔵'+dips.length:''} 共${d.funds.length}只`;

  // ─── 持仓列表 ───
  document.getElementById('fundList').innerHTML = d.funds.map(f => {
    const psign = f.profit >= 0 ? '+' : '';
    const pcls = f.profit >= 0 ? 'up' : 'down';
    const dev = f.devMA20 !== null ? `${f.devMA20>=0?'+':''}${f.devMA20}%` : '--';
    const dcls = f.devMA20 !== null && f.devMA20 > 0 ? 'up' : 'down';
    const sc = f.signal === 'stop_loss' ? '#e74c3c' : f.signal === 'dip_buy' ? '#3498db' : f.signal === 'hold' ? '#27ae60' : '#8899aa';

    return `<div class="fund-row">
      <div class="sig" style="background:${sc}"></div>
      <div class="info">
        <div class="fname">${f.name}</div>
        <div class="fma">MA20 ${f.ma20?.toFixed(3) || '--'} · vsMA20 <span class="${dcls}">${dev}</span> ${f.consec>4?'⚠连续破位':''}</div>
      </div>
      <div class="nums">
        <div class="price">${f.valuation.toFixed(4)}</div>
        <div class="pnl ${pcls}">${psign}¥${Math.abs(f.profit).toFixed(0)}</div>
      </div>
    </div>`;
  }).join('');
}

// ─── AI 聊天 ───
async function askAI() {
  const input = document.getElementById('chatInput');
  const question = input.value.trim();
  if (!question) return;
  const msgs = document.getElementById('chatMessages');

  // 展开聊天区
  msgs.classList.add('open');
  document.querySelector('.chat-header .toggle').textContent = '▲';

  // 显示用户问题
  msgs.innerHTML += `<div class="chat-msg q"><div class="label">你</div>${escapeHtml(question)}</div>`;
  input.value = '';
  msgs.innerHTML += '<div class="chat-spinner" id="spinner">🤔 AI 正在思考...</div>';
  msgs.scrollTop = msgs.scrollHeight;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });
    const data = await resp.json();
    document.getElementById('spinner')?.remove();
    if (data.ok) {
      msgs.innerHTML += `<div class="chat-msg a"><div class="label">🤖 投资助理</div>${renderMd(data.answer)}</div>`;
    } else {
      msgs.innerHTML += `<div class="chat-msg a"><div class="label">⚠️ 出错了</div>${escapeHtml(data.error || '未知错误')}</div>`;
    }
  } catch (e) {
    document.getElementById('spinner')?.remove();
    msgs.innerHTML += `<div class="chat-msg a"><div class="label">⚠️</div>连接失败：${escapeHtml(e.message)}</div>`;
  }
  msgs.scrollTop = msgs.scrollHeight;
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// 轻量 Markdown → HTML（标题、粗体、列表、代码）
function renderMd(md) {
  let html = escapeHtml(md)
    // 标题 ## → h3
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    // 粗体 **text**
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    // 列表项 - text
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    // 行内代码 `text`
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    // 段落间距
    .replace(/\n\n/g, '<br><br>')
    .replace(/\n/g, '<br>');

  // 连续 <li> 包进 <ul>
  html = html.replace(/((?:<li>[\s\S]*?<\/li><br>)+)/g, '<ul>$1</ul>');
  return html;
}

// ═══════════════════════════════════════════════
// 启动
// ═══════════════════════════════════════════════
(async function boot() {
  try {
    const resp = await fetch('/api/login/status');
    const data = await resp.json();
    if (data.loggedIn) {
      showDashboard();
    } else {
      document.getElementById('onboarding').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
    }
  } catch (e) {
    // 连不上服务器，仍然展示引导页
    document.getElementById('onboarding').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
  }
})();

document.querySelector('#dashboard .title').addEventListener('click', load);
setInterval(load, 300000);
</script>
</body>
</html>
